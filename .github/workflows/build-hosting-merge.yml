name: Build Site + Firebase Deploy on merge
'on':
  push:
    branches:
      - beta
      - live
jobs:
  build_deploy:
    name: 'Build and Deploy to: [${{ github.ref_name }}]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 0.163.2
          extended: true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        # Pin to Node 24 runtime until v0.11+ is released (v0.10.0 still uses node20)
        uses: FirebaseExtended/action-hosting-deploy@500ac625ca2dd40cbd15f7659af953801858032a
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ASPECINTIME }}'
          channelId: '${{ github.ref_name }}'
          projectId: aspecintimeseries