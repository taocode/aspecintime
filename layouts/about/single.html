{{ define "main" }}
<section class="mx-auto max-w-3xl px-6 py-16">
  <header class="mb-10">
    <h1 class="font-display text-4xl text-parchment md:text-5xl">{{ .Title }}</h1>
    {{ with .Params.summary }}
    <p class="mt-3 text-lg text-ink-muted">{{ . }}</p>
    {{ end }}
  </header>

  {{ with .Params.image }}
  <figure class="mx-auto mb-10 max-w-md text-center">
    <img
      src="{{ . }}"
      alt="{{ $.Params.imageCaption | default $.Title }}"
      class="mx-auto rounded-sm border border-border"
      loading="lazy"
    />
    {{ with $.Params.imageCaption }}
    <figcaption class="mt-2 text-sm italic text-ink-muted">{{ . }}</figcaption>
    {{ end }}
  </figure>
  {{ end }}

  <div class="prose prose-invert max-w-none">
    {{ .Content }}
  </div>
</section>
{{ end }}
