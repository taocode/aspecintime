{{ define "main" }}
<section class="mx-auto max-w-3xl px-6 py-16">
  <h1 class="font-display text-4xl text-parchment md:text-5xl">{{ .Title }}</h1>
  {{ with .Params.summary }}
  <p class="mt-4 text-lg text-ink-muted">{{ . }}</p>
  {{ end }}
  <div class="prose prose-invert mt-10 max-w-none">
    {{ .Content }}
  </div>
</section>
{{ end }}
