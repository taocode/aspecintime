{{ define "main" }}
<section class="mx-auto max-w-3xl px-6 py-16">
  <header class="mb-10">
    <h1 class="font-display text-4xl text-parchment">{{ .Title }}</h1>
    {{ with .Params.summary }}
    <p class="mt-3 text-ink-muted">{{ . }}</p>
    {{ end }}
    <time class="mt-2 block text-sm text-ink-muted" datetime="{{ .Date.Format "2006-01-02" }}">
      {{ .Date.Format "January 2, 2006" }}
    </time>
  </header>
  <div class="prose prose-invert max-w-none">
    {{ .Content }}
  </div>
</section>
{{ end }}
