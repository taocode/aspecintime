<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
<link rel="icon" href="/images/favicon.svg" type="image/svg+xml" />
<title>{{ block "title" . }}
  {{- .Title }}
{{- if ne .Title .Site.Title }} · {{ .Site.Title }}{{ end -}}
{{ end }}</title>
{{- with .Description }}
<meta name="description" content="{{ . }}" />
{{- else }}
{{- with .Params.summary }}
<meta name="description" content="{{ . }}" />
{{- end }}
{{- end }}
<meta name="author" content="{{ .Site.Params.author }}" />
{{ hugo.Generator }}
<link rel="canonical" href="{{ .Permalink }}" />
{{ partialCached "css" . }}
