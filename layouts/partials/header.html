<nav class="mx-auto flex max-w-6xl items-center justify-between px-6 py-5">
  <a href="/" class="group">
    <span class="block font-display text-2xl text-parchment group-hover:text-amber">{{ .Site.Title }}</span>
    <span class="block text-xs uppercase tracking-[0.2em] text-ink-muted">{{ .Site.Params.tagline }}</span>
  </a>
  <ul class="hidden items-center gap-8 md:flex">
    {{ range .Site.Menus.main }}
    <li>
      <a
        href="{{ .URL }}"
        class="{{ if $.IsMenuCurrent "main" . }}text-amber{{ else }}text-ink hover:text-amber{{ end }} text-sm uppercase tracking-wider transition-colors"
      >{{ .Name }}</a>
    </li>
    {{ end }}
  </ul>
  <details class="relative md:hidden">
    <summary class="cursor-pointer list-none text-sm uppercase tracking-wider text-ink">Menu</summary>
    <ul class="absolute right-0 top-full z-10 mt-2 min-w-[180px] rounded border border-border bg-void-light py-2 shadow-lg">
      {{ range .Site.Menus.main }}
      <li>
        <a href="{{ .URL }}" class="block px-4 py-2 text-sm text-ink hover:bg-cosmos hover:text-amber">{{ .Name }}</a>
      </li>
      {{ end }}
    </ul>
  </details>
</nav>
